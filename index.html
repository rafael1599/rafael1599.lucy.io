<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucy Shop</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    fetch('lucy-shop-catalog.jsx')
      .then(r => r.text())
      .then(code => {
        code = code.replace(/import\s*\{([^}]+)\}\s*from\s*["']react["']\s*;?/, 'const {$1} = React;');
        code = code.replace(/export\s+default\s+/, '');
        code += '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(LucyShop));';
        const output = Babel.transform(code, { presets: ['react'] }).code;
        const s = document.createElement('script');
        s.textContent = output;
        document.body.appendChild(s);
      });
  </script>
</body>
</html>
